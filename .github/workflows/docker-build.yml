name: Build and Push to Docker Hub

on:
  push:
    branches: 
      - task-python-hello-world  # Updated to match your current branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # Important: If your Dockerfile is inside 'python-hello-world', 
          # change context to: ./python-hello-world
          context: . 
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/python-hello-world:latest
            ${{ secrets.DOCKER_USERNAME }}/python-hello-world:${{ github.sha }}
